<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f5ef" />
    <title>长期主义番茄钟</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone-shell">
      <header class="app-header">
        <button class="icon-button ghost" id="backButton" aria-label="返回">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <div>
          <p class="eyebrow" id="headerKicker">长期主义番茄钟</p>
          <h1 id="headerTitle">今天</h1>
        </div>
        <button class="icon-button" id="newGoalButton" aria-label="新建目标">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </header>

      <main id="app" class="app-main"></main>

      <nav class="tab-bar" aria-label="主导航">
        <button class="tab-button active" data-view="today" aria-label="今日">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 2v4M16 2v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" />
          </svg>
          <span>今日</span>
        </button>
        <button class="tab-button" data-view="focus" aria-label="专注">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="13" r="8" />
            <path d="M12 13V8M9 2h6M15 5l2-2" />
          </svg>
          <span>专注</span>
        </button>
        <button class="tab-button" data-view="roadmap" aria-label="路线">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 20V4M18 20V4M6 7h8l-1.5 3L14 13H6M18 17h-8l1.5-3L10 11h8" />
          </svg>
          <span>路线</span>
        </button>
        <button class="tab-button" data-view="history" aria-label="历史">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6M12 7v6l4 2" />
          </svg>
          <span>历史</span>
        </button>
      </nav>
    </div>

    <dialog id="goalDialog" class="sheet">
      <form method="dialog" id="goalForm" class="sheet-body">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">创建长期目标</p>
            <h2>让 AI 先搭路线，再逐段细化</h2>
          </div>
          <button class="icon-button ghost" value="cancel" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <label class="field">
          <span>长期目标</span>
          <textarea name="goal" rows="3" placeholder="例如：60 天内完成日语 N3 第一轮基础学习" required></textarea>
        </label>

        <div class="field-grid">
          <label class="field">
            <span>开始日期</span>
            <input type="date" name="startDate" required />
          </label>
          <label class="field">
            <span>结束日期</span>
            <input type="date" name="endDate" required />
          </label>
        </div>

        <label class="check-row">
          <input type="checkbox" name="includeStart" checked />
          <span>包含起始日当天</span>
        </label>

        <div class="field-grid">
          <label class="field">
            <span>每日投入</span>
            <select name="minutes">
              <option value="25">25 分钟</option>
              <option value="45" selected>45 分钟</option>
              <option value="60">60 分钟</option>
              <option value="90">90 分钟</option>
            </select>
          </label>
          <label class="field">
            <span>执行强度</span>
            <select name="intensity">
              <option value="gentle">轻量</option>
              <option value="steady" selected>标准</option>
              <option value="sprint">冲刺</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>计划偏好</span>
          <input name="preference" placeholder="例如：周末轻一点，每天最多三件事，要有复习日" />
        </label>

        <details class="ai-config">
          <summary>AI 设置</summary>
          <label class="field">
            <span>OpenAI API Key</span>
            <input name="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
          </label>
          <label class="field">
            <span>模型</span>
            <input name="model" value="gpt-4.1-mini" />
          </label>
        </details>

        <button class="primary-button" type="submit">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 14.4 8.6 20 11l-5.6 2.4L12 19l-2.4-5.6L4 11l5.6-2.4Z" />
          </svg>
          生成路线图
        </button>
      </form>
    </dialog>

    <dialog id="reviseDialog" class="sheet">
      <form method="dialog" id="reviseForm" class="sheet-body">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">AI 调整后续</p>
            <h2>说说哪里不合适</h2>
          </div>
          <button class="icon-button ghost" value="cancel" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <label class="field">
          <span>修改意见</span>
          <textarea name="feedback" rows="5" placeholder="例如：接下来两周工作很忙，每天只能做一件核心任务；请保留复习，但减少新内容。"></textarea>
        </label>
        <button class="primary-button" type="submit">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12h16M14 6l6 6-6 6" />
          </svg>
          重新安排未完成部分
        </button>
      </form>
    </dialog>

    <dialog id="dateDialog" class="sheet">
      <form method="dialog" id="dateForm" class="sheet-body compact-sheet">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">调整截止日</p>
            <h2>只影响后续安排</h2>
          </div>
          <button class="icon-button ghost" value="cancel" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <label class="field">
          <span>新的结束日期</span>
          <input type="date" name="endDate" required />
        </label>
        <button class="primary-button" type="submit">确认调整</button>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
